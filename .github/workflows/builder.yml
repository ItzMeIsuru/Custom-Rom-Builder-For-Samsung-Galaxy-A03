name: Custom Rom Builder Samsung Galaxy A03
permissions:
  contents: write
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
        GSI:
              description: ' GSI Image Direct Link '
              required: true
              default: 'https://github.com/ponces/treble_build_aosp/releases/download/v2023.12.01/aosp-arm64-ab-gapps-14.0-20231201.img.xz'        
        NAME:
              description: 'Rom Name'
              required: true
              default: 'aosp-arm64-ab-gapps-14.0-a03.7z'
        VERSION:
              description: 'Baseband Version'
              required: true
              default: 'A035FXXU4CWI1'
        VENDOR:
              description: 'Enter Direct Link Of Your Vendor (Dropbox or vendor.img direct link)'
              required: true
              default: 'https://sourceforge.net/projects/a03-files/files/A035FXXU4CWI1/vendor.img'
jobs:
  Build:
    runs-on: ubuntu-latest

    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y zip xz-utils unzip p7zip-full wget simg2img
        
    - name: Installing Tools
      run: |
        git clone https://github.com/Exynos-nigg/lpunpack-lpmake-mirror.git lpbinary
        cd lpbinary
        bash install.sh
    - name: Downloading Your GSI And Extracting
      run: |
        cd lpbinary/binary
        wget --tries=3 "${{ github.event.inputs.GSI }}"
        mkdir sys
        gsi_file=""
        shopt -s nullglob
        for ext in xz gz img; do
          for candidate in *."$ext"; do
            if [ -f "$candidate" ]; then
              gsi_file="$candidate"
              break 2
            fi
          done
        done
        shopt -u nullglob
        if [ -z "$gsi_file" ]; then
          echo "No .xz, .gz, or .img GSI file was downloaded."
          exit 1
        fi
        gsi_name=$(basename "$gsi_file")
        mv "$gsi_file" sys
        cd sys
        case "$gsi_name" in
          *.xz) unxz "$gsi_name" ;;
          *.gz) gunzip "$gsi_name" ;;
          *.img) ;;
          *)
            echo "Unsupported GSI file type: $gsi_name"
            exit 1
            ;;
        esac
        mv *.img ../system.img
        cd ..
    - name: Preparing Files
      run: |
        cd lpbinary/binary
        vendor_url="${{ github.event.inputs.VENDOR }}"
        
        # Convert SourceForge web links to direct download links
        if [[ "$vendor_url" == *"sourceforge.net/projects/"* ]]; then
          vendor_url=$(echo "$vendor_url" | sed 's/sourceforge.net\/projects/downloads.sourceforge.net\/project/g' | sed 's/\/files\//\//g')
        fi
        
        # Remove /download suffix if present
        vendor_url="${vendor_url%/download}"
        
        # Check if this is a Dropbox link
        if [[ "$vendor_url" == *"dropbox.com"* ]]; then
          # Force direct download from Dropbox by appending ?dl=1
          vendor_url="${vendor_url%\?*}?dl=1"
          echo "Detected Dropbox link, appending ?dl=1 for direct download"
          wget --tries=3 -O vendor.img "$vendor_url"
        else
          # For non-Dropbox links, validate they end with /vendor.img
          if [[ "$vendor_url" != */vendor.img ]]; then
            echo "Vendor URL must point to /vendor.img (or be a valid Dropbox link)."
            exit 1
          fi
          wget --tries=3 -O vendor.img "$vendor_url"
          
          # Also download product.img and system_ext.img
          base_url="${vendor_url%/vendor.img}"
          product_url="${base_url}/product.img"
          system_ext_url="${base_url}/system_ext.img"
          wget --tries=3 -O product.img "$product_url" || echo "Warning: product.img not found"
          wget --tries=3 -O system_ext.img "$system_ext_url" || echo "Warning: system_ext.img not found"
        fi
        
        # Verify vendor.img was created and is a valid image (not an HTML error page, size > 1MB)
        if [ ! -f vendor.img ] || [ $(stat -c%s vendor.img) -lt 1048576 ]; then
          echo "Failed to download vendor.img or file is an HTML error page (too small)"
          exit 1
        fi
    - name: Packing
      run: |
        cd lpbinary/binary
        
        # Function to check and convert raw images to sparse images
        convert_to_sparse() {
          local img="$1"
          if [ -f "$img" ]; then
            # Read first 4 bytes to check for sparse image magic header (3a ff 26 ed)
            magic=$(od -v -N 4 -t x1 "$img" | head -n 1 | awk '{print $2$3$4$5}')
            if [ "$magic" != "3aff26ed" ]; then
              echo "$img is not a sparse image (magic: $magic). Converting..."
              img2simg "$img" "${img}.sparse"
              mv "${img}.sparse" "$img"
            else
              echo "$img is already a sparse image."
            fi
          fi
        }
        
        convert_to_sparse system.img
        convert_to_sparse vendor.img
        convert_to_sparse product.img
        convert_to_sparse system_ext.img
        
        args=(
          --metadata-size 65536
          --super-name super
          --metadata-slots 2
          --device super:6763315200
          --group main:6761218048
          --partition "system:readonly:$(stat -c%s system.img):main" --image system=system.img
          --partition "vendor:readonly:$(stat -c%s vendor.img):main" --image vendor=vendor.img
        )
        if [ -f product.img ] && [ $(stat -c%s product.img) -gt 1048576 ]; then
          args+=(--partition "product:readonly:$(stat -c%s product.img):main" --image product=product.img)
        fi
        if [ -f system_ext.img ] && [ $(stat -c%s system_ext.img) -gt 1048576 ]; then
          args+=(--partition "system_ext:readonly:$(stat -c%s system_ext.img):main" --image system_ext=system_ext.img)
        fi
        args+=(--sparse --output super.img)
        ./lpmake "${args[@]}"
    - name: Creating tar and compressing to 7z
      run: |
        cd lpbinary/binary
        tar -cvf super.tar super.img
        rm -rf super.img
        7z a ${{ github.event.inputs.NAME }} super.tar
        rm -rf super.tar
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: lpbinary/binary/${{ github.event.inputs.NAME }}
        name: ${{ github.event.inputs.NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
            Device: Samsung Galaxy A03
            Version: ${{ github.event.inputs.VERSION }}
            Rom Name: ${{ github.event.inputs.NAME }}
            Flash: Extract the 7z file and flash through ODIN in AP Section.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
